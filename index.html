<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanPick - 건강 식품 랭킹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f7f7f5;
            --bg-nav: #ffffff;
            --text: #1c1c1a;
            --text-muted: #6b6b66;
            --border: #e4e4df;
            --green-excellent: #1a6b3a;
            --orange-good: #c47a15;
            --red-caution: #c0392b;
            --btn-coupang: #1a6b3a;
            --btn-coupang-hover: #14532d;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text);
            padding-top: 56px;
        }

        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
        }

        .nav-inner {
            max-width: 540px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 24px 40px;
        }

        .partner-disclosure {
            font-size: 0.68rem;
            color: var(--text-muted);
            line-height: 1.5;
            text-align: center;
            margin: -6px 0 18px;
            padding: 0 8px;
        }

        .intro {
            margin-bottom: 22px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.5;
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #b8c4b8;
            box-shadow: 0 0 0 3px rgba(26, 107, 58, 0.08);
        }

        .search-box input::placeholder {
            color: #9c9c96;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9c9c96;
            font-size: 1rem;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
        }

        .category-btn {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .category-btn:hover {
            border-color: #c8c8c2;
            color: var(--text);
        }

        .category-btn.active {
            background: var(--green-excellent);
            border-color: var(--green-excellent);
            color: #fff;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .product-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 14px 14px 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: stretch;
            gap: 10px;
            min-width: 0;
        }

        .product-card:hover {
            border-color: #d0d0ca;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .product-card.hidden {
            display: none;
        }

        .card-row-image {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-shrink: 0;
        }

        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
            flex-shrink: 0;
            background: #5c5c58;
            margin-top: 16px;
        }

        .rank-1 { background: #3d3d3a; }
        .rank-2 { background: #52524e; }
        .rank-3 { background: #6b6b66; }
        .rank-4,
        .rank-5,
        .rank-6 { background: #8a8a84; }

        .product-thumb {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            border-radius: 10px;
            background: #e4e4e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-thumb-emoji {
            font-size: 1.65rem;
            line-height: 1;
        }

        .product-info h3 {
            font-size: 1.02rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
        }

        .product-subline {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-top: 4px;
        }

        .product-subline .product-brand {
            font-weight: 500;
            color: #5c5c58;
        }

        .product-subline .product-pack {
            font-weight: 400;
            color: var(--text-muted);
        }

        .product-subline .meta-sep {
            margin: 0 5px;
            color: #c8c8c0;
            font-weight: 400;
        }

        .card-center-divider {
            height: 1px;
            background: #ebebe6;
            margin: 10px 0 8px;
        }

        .score-metrics {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            line-height: 1.35;
            color: #4a4a45;
        }

        .metric-row-label {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .metric-k {
            font-weight: 600;
            color: #3d3d3a;
            flex-shrink: 0;
        }

        .metric-v {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #5a5a55;
        }

        .metric-score-side {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metric-fraction {
            font-size: 0.68rem;
            font-weight: 600;
            color: #3d3d3a;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .metric-fraction .metric-max {
            font-weight: 500;
            color: var(--text-muted);
        }

        .metric-bar {
            width: 44px;
            height: 4px;
            background: #ecece8;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .metric-bar-fill {
            display: block;
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #2d8f52, var(--green-excellent));
            max-width: 100%;
        }

        .score-gauge-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .score-gauge-wrap {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        .score-gauge-wrap svg {
            width: 64px;
            height: 64px;
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: #ecece8;
            stroke-width: 5;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--green-excellent);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            transition: stroke-dashoffset 0.35s ease;
        }

        .gauge-fill.gauge-good {
            stroke: var(--orange-good);
        }

        .gauge-fill.gauge-caution {
            stroke: var(--red-caution);
        }

        .gauge-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding-bottom: 2px;
        }

        .gauge-score-num {
            font-size: 1.28rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .gauge-score-unit {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .card-aside-cluster .grade-badge {
            display: inline-block;
            font-size: 0.58rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 0;
        }

        .grade-excellent {
            background: rgba(26, 107, 58, 0.12);
            color: var(--green-excellent);
        }

        .grade-good {
            background: rgba(196, 122, 21, 0.14);
            color: var(--orange-good);
        }

        .grade-caution {
            background: rgba(192, 57, 43, 0.12);
            color: var(--red-caution);
        }

        .coupang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 8px;
            background: var(--btn-coupang);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .coupang-btn:hover {
            background: var(--btn-coupang-hover);
            box-shadow: 0 4px 14px rgba(26, 107, 58, 0.25);
        }

        .coupang-btn:active {
            transform: translateY(1px);
        }

        .empty-state {
            text-align: center;
            padding: 44px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-state.hidden {
            display: none;
        }

        .footer-note {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* 데스크톱: 가로 3열 (이미지 | 본문 | 게이지+버튼) */
        .card-center-cluster {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
            padding: 2px 0;
        }

        .card-row-title-block {
            min-width: 0;
        }

        .card-row-metrics-block {
            min-width: 0;
        }

        .card-aside-cluster {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-left: 8px;
            margin-left: 2px;
            border-left: 1px solid #efefec;
            width: 76px;
        }

        .card-gauge-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-aside-cluster .coupang-btn {
            width: 100%;
        }

        @media (max-width: 480px) {
            body {
                padding-top: 52px;
            }

            .nav-inner {
                padding: 12px 16px;
            }

            .brand {
                font-size: 1.1rem;
            }

            .container {
                padding: 16px 14px 32px;
            }

            .partner-disclosure {
                font-size: 0.62rem;
                margin: -4px 0 14px;
            }

            .intro {
                margin-bottom: 16px;
            }

            .subtitle {
                font-size: 0.82rem;
                line-height: 1.45;
            }

            .search-box {
                margin-bottom: 10px;
            }

            .search-box input {
                padding: 11px 12px 11px 38px;
                font-size: 0.88rem;
                border-radius: 9px;
            }

            .search-icon {
                left: 12px;
                font-size: 0.92rem;
            }

            .category-tabs {
                gap: 6px;
                margin-bottom: 14px;
                flex-wrap: wrap;
            }

            .category-btn {
                flex: 1 1 calc(33.333% - 4px);
                min-width: 0;
                padding: 9px 6px;
                font-size: 0.76rem;
                border-radius: 9px;
                line-height: 1.25;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .product-list {
                gap: 9px;
            }

            .product-card {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 12px;
            }

            .card-center-cluster,
            .card-aside-cluster {
                display: contents;
            }

            .card-row-image {
                display: flex;
                align-items: center;
                gap: 8px;
                order: 1;
            }

            .card-row-title-block {
                order: 2;
            }

            .card-row-metrics-block {
                order: 3;
            }

            .card-gauge-col {
                order: 4;
                width: 100%;
                padding-top: 2px;
            }

            .product-card .coupang-btn {
                order: 5;
                width: 100%;
                max-width: none;
                padding: 11px 14px;
                font-size: 0.85rem;
                margin-top: 2px;
            }

            .rank-badge {
                margin-top: 0;
                align-self: center;
                width: 26px;
                height: 26px;
                font-size: 0.75rem;
                border-radius: 7px;
            }

            .product-thumb {
                width: 56px;
                height: 56px;
                border-radius: 9px;
            }

            .product-thumb-emoji {
                font-size: 1.45rem;
            }

            .product-info h3 {
                font-size: 0.88rem;
                line-height: 1.4;
                word-break: keep-all;
                overflow-wrap: break-word;
            }

            .product-subline {
                font-size: 0.65rem;
                margin-top: 3px;
            }

            .card-center-divider {
                margin: 8px 0 6px;
            }

            .score-metrics {
                gap: 5px;
            }

            .metric-row {
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 4px 6px;
                font-size: 0.62rem;
                line-height: 1.3;
            }

            .metric-row-label {
                flex: 1 1 100%;
                min-width: 0;
                align-items: flex-start;
            }

            .metric-v {
                white-space: normal;
                overflow: visible;
                text-overflow: unset;
                word-break: break-word;
            }

            .metric-score-side {
                flex: 1 1 100%;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 1px;
            }

            .metric-fraction {
                font-size: 0.6rem;
            }

            .metric-bar {
                width: 56px;
                height: 3px;
            }

            .score-gauge-stack {
                gap: 5px;
            }

            .score-gauge-wrap {
                width: 58px;
                height: 58px;
            }

            .score-gauge-wrap svg {
                width: 58px;
                height: 58px;
            }

            .gauge-score-num {
                font-size: 1.12rem;
            }

            .gauge-score-unit {
                font-size: 0.55rem;
                margin-top: 2px;
            }

            .card-aside-cluster .grade-badge,
            .card-gauge-col .grade-badge {
                font-size: 0.54rem;
                padding: 2px 5px;
            }

            .empty-state {
                padding: 32px 14px;
                font-size: 0.88rem;
            }

            .footer-note {
                margin-top: 22px;
                padding-top: 14px;
                font-size: 0.72rem;
            }
        }
    </style>
</head>

                brand: '코카콜라음료',
                image: '',
                mainIngredient: { name: '탄산수', percent: null },
                additives: '액상과당·카라멜색소·인산·향료',
                certifications: []
            },
            {
                name: '웅진식품 자연은 사과',
                packSize: '1000ml',
                score: 92,
                category: '음료',
                brand: '웅진식품',
                image: '',
                mainIngredient: { name: '사과과즙', percent: 100 },
                additives: '',
                certifications: []
            }
        ];

        function getGrade(score) {
            if (score >= 85) return { label: '우수', class: 'grade-excellent' };
            if (score >= 65) return { label: '양호', class: 'grade-good' };
            return { label: '주의', class: 'grade-caution' };
        }

        function formatMainIngredient(mi) {
            if (mi.percent != null && mi.percent !== '') {
                return `${mi.name} ${mi.percent}%`;
            }
            return mi.name;
        }

        function formatAdditives(text) {
            return text && String(text).trim() ? text.trim() : '첨가물 없음';
        }

        function computeScoreBreakdown(product) {
            const caps = [35, 30, 20, 15];
            const target = product.score;

            const qMain = product.mainIngredient.percent != null
                ? Math.min(1, product.mainIngredient.percent / 100)
                : 0.35;

            const t = (product.additives || '').trim();
            const pieces = t ? t.split(/[·,]/).filter(Boolean).length : 0;
            const qAdd = t
                ? Math.max(0.12, 1 - 0.1 * pieces - Math.min(0.5, t.length / 90))
                : 1;

            const certs = product.certifications || [];
            const certOnly = certs.filter(c => c !== 'HACCP');
            let qCert = 0.1;
            if (certOnly.includes('유기농')) qCert += 0.52;
            if (certOnly.includes('무항생제')) qCert += 0.4;
            qCert = Math.min(1, qCert);

            const qHyg = certs.includes('HACCP') ? 0.92 : 0.46;

            const ideals = [
                qMain * caps[0],
                qAdd * caps[1],
                qCert * caps[2],
                qHyg * caps[3]
            ];
            const sumI = ideals.reduce((a, b) => a + b, 0) || 1;
            const parts = ideals.map(x => (x / sumI) * target);

            const scores = parts.map((p, i) =>
                Math.min(caps[i], Math.max(0, Math.round(p)))
            );
            let diff = target - scores.reduce((a, b) => a + b, 0);
            let guard = 0;
            while (diff !== 0 && guard < 240) {
                if (diff > 0) {
                    const idx = caps.findIndex((c, j) => scores[j] < c);
                    if (idx < 0) break;
                    scores[idx]++;
                    diff--;
                } else {
                    const idx = scores.findIndex(s => s > 0);
                    if (idx < 0) break;
                    scores[idx]--;
                    diff++;
                }
                guard++;
            }

            return {
                main: { score: scores[0], max: caps[0], text: formatMainIngredient(product.mainIngredient) },
                additive: { score: scores[1], max: caps[1], text: formatAdditives(product.additives) },
                cert: {
                    score: scores[2],
                    max: caps[2],
                    text: certOnly.length ? certOnly.join('·') : '해당 없음'
                },
                hygiene: {
                    score: scores[3],
                    max: caps[3],
                    text: certs.includes('HACCP') ? 'HACCP A등급' : '해당 없음'
                }
            };
        }

        function metricRowHtml(keyLabel, valueText, score, max) {
            const pct = max > 0 ? Math.min(100, (score / max) * 100) : 0;
            return `
                <div class="metric-row">
                    <div class="metric-row-label">
                        <span class="metric-k">${keyLabel}</span>
                        <span class="metric-v">${valueText}</span>
                    </div>
                    <div class="metric-score-side">
                        <span class="metric-fraction">[ ${score}점 <span class="metric-max">/ ${max}점</span> ]</span>
                        <div class="metric-bar" role="presentation"><span class="metric-bar-fill" style="width:${pct}%"></span></div>
                    </div>
                </div>
            `;
        }

        function gaugeStrokeClass(gradeClass) {
            if (gradeClass === 'grade-good') return 'gauge-fill gauge-good';
            if (gradeClass === 'grade-caution') return 'gauge-fill gauge-caution';
            return 'gauge-fill';
        }

        function getCoupangUrl(product) {
            if (product.coupangUrl && String(product.coupangUrl).trim()) {
                return String(product.coupangUrl).trim();
            }
            const q = `${product.name} ${product.packSize}`.trim();
            return 'https://www.coupang.com/np/search?q=' + encodeURIComponent(q);
        }

        function thumbInnerHTML(product) {
            const src = product.image && String(product.image).trim();
            if (src) {
                return `<img src="${src}" alt="${product.name}">`;
            }
            const emoji = CATEGORY_EMOJI[product.category] || '📦';
            return `<span class="product-thumb-emoji" aria-hidden="true">${emoji}</span>`;
        }

        function renderProducts(filteredProducts) {
            const list = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');

            list.innerHTML = '';

            if (filteredProducts.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            filteredProducts.forEach((product, index) => {
                const grade = getGrade(product.score);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.dataset.name = product.name;
                card.dataset.category = product.category;

                const rankClass = `rank-${Math.min(index + 1, 6)}`;

                const bd = computeScoreBreakdown(product);
                const thumbHtml = thumbInnerHTML(product);
                const gaugeR = 26;
                const gaugeLen = 2 * Math.PI * gaugeR;
                const gaugeOff = gaugeLen * (1 - product.score / 100);
                const strokeCls = gaugeStrokeClass(grade.class);

                card.innerHTML = `
                    <div class="card-row-image">
                        <span class="rank-badge ${rankClass}" aria-label="순위 ${index + 1}">${index + 1}</span>
                        <div class="product-thumb">${thumbHtml}</div>
                    </div>
                    <div class="card-center-cluster">
                        <div class="card-row-title-block">
                            <div class="product-info">
                                <h3>${product.name}</h3>
                                <p class="product-subline"><span class="product-brand">${product.brand}</span><span class="meta-sep">·</span><span class="product-pack">${product.packSize}</span></p>
                            </div>
                        </div>
                        <div class="card-row-metrics-block">
                            <div class="card-center-divider" aria-hidden="true"></div>
                            <div class="score-metrics" role="group" aria-label="세부 점수">
                                ${metricRowHtml('주원료:', bd.main.text, bd.main.score, bd.main.max)}
                                ${metricRowHtml('첨가물:', bd.additive.text, bd.additive.score, bd.additive.max)}
                                ${metricRowHtml('인증:', bd.cert.text, bd.cert.score, bd.cert.max)}
                                ${metricRowHtml('위생:', bd.hygiene.text, bd.hygiene.score, bd.hygiene.max)}
                            </div>
                        </div>
                    </div>
                    <div class="card-aside-cluster">
                        <div class="card-gauge-col">
                            <div class="score-gauge-stack">
                                <div class="score-gauge-wrap" role="img" aria-label="최종 점수 ${product.score}점 만점 100">
                                    <svg viewBox="0 0 64 64" aria-hidden="true">
                                        <circle class="gauge-bg" cx="32" cy="32" r="${gaugeR}" />
                                        <circle class="${strokeCls}" cx="32" cy="32" r="${gaugeR}"
                                            stroke-dasharray="${gaugeLen}"
                                            stroke-dashoffset="${gaugeOff}" />
                                    </svg>
                                    <div class="gauge-center">
                                        <span class="gauge-score-num">${product.score}</span>
                                        <span class="gauge-score-unit">점</span>
                                    </div>
                                </div>
                                <span class="grade-badge ${grade.class}">${grade.label}</span>
                            </div>
                        </div>
                        <a href="${getCoupangUrl(product)}" target="_blank" rel="noopener noreferrer" class="coupang-btn">구매</a>
                    </div>
                `;

                list.appendChild(card);
            });
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;

            let filtered = products.filter(p => {
                const haystack = [p.name, p.brand, p.packSize, p.category].join(' ').toLowerCase();
                const matchSearch = !searchTerm || haystack.includes(searchTerm);
                const matchCategory = activeCategory === '전체' || p.category === activeCategory;
                return matchSearch && matchCategory;
            });

            filtered.sort((a, b) => b.score - a.score);
            renderProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterProducts);

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
                filterProducts();
            });
        });

        filterProducts();
    </script>
</body>
</html>
