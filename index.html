<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePick - 건강 식품 랭킹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f7f7f5;
            --bg-nav: #ffffff;
            --text: #1c1c1a;
            --text-muted: #6b6b66;
            --border: #e4e4df;
            --green-excellent: #1a6b3a;
            --orange-good: #c47a15;
            --red-caution: #c0392b;
            --btn-coupang: #1a6b3a;
            --btn-coupang-hover: #14532d;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text);
            padding-top: 56px;
        }

        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
        }

        .nav-inner {
            max-width: 540px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 24px 40px;
        }

        .partner-disclosure {
            font-size: 0.68rem;
            color: var(--text-muted);
            line-height: 1.5;
            text-align: center;
            margin: -6px 0 18px;
            padding: 0 8px;
        }

        .intro {
            margin-bottom: 22px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.5;
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #b8c4b8;
            box-shadow: 0 0 0 3px rgba(26, 107, 58, 0.08);
        }

        .search-box input::placeholder {
            color: #9c9c96;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9c9c96;
            font-size: 1rem;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
        }

        .category-btn {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .category-btn:hover {
            border-color: #c8c8c2;
            color: var(--text);
        }

        .category-btn.active {
            background: var(--green-excellent);
            border-color: var(--green-excellent);
            color: #fff;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .product-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 14px 14px 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: stretch;
            gap: 10px;
            min-width: 0;
        }

        .product-card:hover {
            border-color: #d0d0ca;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .product-card.hidden {
            display: none;
        }

        .card-row-image {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-shrink: 0;
        }

        .rank-badge {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
            flex-shrink: 0;
            background: #5c5c58;
            margin-top: 16px;
        }

        .rank-1 { background: #3d3d3a; }
        .rank-2 { background: #52524e; }
        .rank-3 { background: #6b6b66; }
        .rank-4,
        .rank-5,
        .rank-6 { background: #8a8a84; }

        .product-thumb {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            border-radius: 10px;
            background: #e4e4e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-thumb-emoji {
            font-size: 1.65rem;
            line-height: 1;
        }

        .product-info h3 {
            font-size: 1.02rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
        }

        .product-subline {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-top: 4px;
        }

        .product-subline .product-brand {
            font-weight: 500;
            color: #5c5c58;
        }

        .product-subline .product-pack {
            font-weight: 400;
            color: var(--text-muted);
        }

        .product-subline .meta-sep {
            margin: 0 5px;
            color: #c8c8c0;
            font-weight: 400;
        }

        .card-center-divider {
            height: 1px;
            background: #ebebe6;
            margin: 10px 0 8px;
        }

        .score-metrics {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            line-height: 1.35;
            color: #4a4a45;
        }

        .metric-row-label {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .metric-k {
            font-weight: 600;
            color: #3d3d3a;
            flex-shrink: 0;
        }

        .metric-v {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #5a5a55;
        }

        .metric-score-side {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metric-fraction {
            font-size: 0.68rem;
            font-weight: 600;
            color: #3d3d3a;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .metric-fraction .metric-max {
            font-weight: 500;
            color: var(--text-muted);
        }

        .metric-bar {
            width: 44px;
            height: 4px;
            background: #ecece8;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .metric-bar-fill {
            display: block;
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #2d8f52, var(--green-excellent));
            max-width: 100%;
        }

        .score-gauge-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .score-gauge-wrap {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        .score-gauge-wrap svg {
            width: 64px;
            height: 64px;
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: #ecece8;
            stroke-width: 5;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--green-excellent);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            transition: stroke-dashoffset 0.35s ease;
        }

        .gauge-fill.gauge-good {
            stroke: var(--orange-good);
        }

        .gauge-fill.gauge-caution {
            stroke: var(--red-caution);
        }

        .gauge-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding-bottom: 2px;
        }

        .gauge-score-num {
            font-size: 1.28rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .gauge-score-unit {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .card-aside-cluster .grade-badge {
            display: inline-block;
            font-size: 0.58rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 0;
        }

        .grade-excellent {
            background: rgba(26, 107, 58, 0.12);
            color: var(--green-excellent);
        }

        .grade-good {
            background: rgba(196, 122, 21, 0.14);
            color: var(--orange-good);
        }

        .grade-caution {
            background: rgba(192, 57, 43, 0.12);
            color: var(--red-caution);
        }

        .coupang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 8px;
            background: var(--btn-coupang);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .coupang-btn:hover {
            background: var(--btn-coupang-hover);
            box-shadow: 0 4px 14px rgba(26, 107, 58, 0.25);
        }

        .coupang-btn:active {
            transform: translateY(1px);
        }

        .empty-state {
            text-align: center;
            padding: 44px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-state.hidden {
            display: none;
        }

        .footer-note {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* 데스크톱: 가로 3열 (이미지 | 본문 | 게이지+버튼) */
        .card-center-cluster {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
            padding: 2px 0;
        }

        .card-row-title-block {
            min-width: 0;
        }

        .card-row-metrics-block {
            min-width: 0;
        }

        .card-aside-cluster {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-left: 8px;
            margin-left: 2px;
            border-left: 1px solid #efefec;
            width: 76px;
        }

        .card-gauge-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-aside-cluster .coupang-btn {
            width: 100%;
        }

        /* ── 정렬 바 ── */
        .sort-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .sort-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .sort-btn {
            padding: 5px 10px;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .sort-btn.active {
            background: var(--text);
            border-color: var(--text);
            color: #fff;
        }

        /* ── 로딩 ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .loading-state.hidden { display: none; }

        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--green-excellent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 페이지네이션 ── */
        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        .pagination-bar.hidden { display: none; }

        .page-btn {
            min-width: 34px;
            height: 34px;
            padding: 0 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .page-btn:hover { border-color: #b8c4b8; color: var(--text); }
        .page-btn.active {
            background: var(--green-excellent);
            border-color: var(--green-excellent);
            color: #fff;
        }

        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── 첨가물 경고 태그 ── */
        .additive-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 2px;
        }

        .additive-tag {
            font-size: 0.58rem;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .tag-danger { background: rgba(192,57,43,0.1); color: var(--red-caution); }
        .tag-warning { background: rgba(196,122,21,0.12); color: var(--orange-good); }
        .tag-safe { background: rgba(26,107,58,0.1); color: var(--green-excellent); }

        /* ── 출처 뱃지 ── */
        .source-badges {
            display: flex;
            gap: 4px;
            margin-top: 3px;
        }

        .source-badge {
            font-size: 0.58rem;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 4px;
            border: 1px solid;
        }

        .badge-coupang { color: #e51a24; border-color: rgba(229,26,36,0.3); background: rgba(229,26,36,0.06); }
        .badge-emart { color: #1b5ea8; border-color: rgba(27,94,168,0.3); background: rgba(27,94,168,0.06); }

        /* ── 카테고리 탭 스크롤 ── */
        .category-tabs {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-wrap: nowrap;
            padding-bottom: 2px;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-btn { flex-shrink: 0; }

        @media (max-width: 480px) {
            body {
                padding-top: 52px;
            }

            .nav-inner {
                padding: 12px 16px;
            }

            .brand {
                font-size: 1.1rem;
            }

            .container {
                padding: 16px 14px 32px;
            }

            .partner-disclosure {
                font-size: 0.62rem;
                margin: -4px 0 14px;
            }

            .intro {
                margin-bottom: 16px;
            }

            .subtitle {
                font-size: 0.82rem;
                line-height: 1.45;
            }

            .search-box {
                margin-bottom: 10px;
            }

            .search-box input {
                padding: 11px 12px 11px 38px;
                font-size: 0.88rem;
                border-radius: 9px;
            }

            .search-icon {
                left: 12px;
                font-size: 0.92rem;
            }

            .category-tabs {
                gap: 6px;
                margin-bottom: 14px;
                flex-wrap: wrap;
            }

            .category-btn {
                flex: 1 1 calc(33.333% - 4px);
                min-width: 0;
                padding: 9px 6px;
                font-size: 0.76rem;
                border-radius: 9px;
                line-height: 1.25;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .product-list {
                gap: 9px;
            }

            .product-card {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 12px;
            }

            .card-center-cluster,
            .card-aside-cluster {
                display: contents;
            }

            .card-row-image {
                display: flex;
                align-items: center;
                gap: 8px;
                order: 1;
            }

            .card-row-title-block {
                order: 2;
            }

            .card-row-metrics-block {
                order: 3;
            }

            .card-gauge-col {
                order: 4;
                width: 100%;
                padding-top: 2px;
            }

            .product-card .coupang-btn {
                order: 5;
                width: 100%;
                max-width: none;
                padding: 11px 14px;
                font-size: 0.85rem;
                margin-top: 2px;
            }

            .rank-badge {
                margin-top: 0;
                align-self: center;
                width: 26px;
                height: 26px;
                font-size: 0.75rem;
                border-radius: 7px;
            }

            .product-thumb {
                width: 56px;
                height: 56px;
                border-radius: 9px;
            }

            .product-thumb-emoji {
                font-size: 1.45rem;
            }

            .product-info h3 {
                font-size: 0.88rem;
                line-height: 1.4;
                word-break: keep-all;
                overflow-wrap: break-word;
            }

            .product-subline {
                font-size: 0.65rem;
                margin-top: 3px;
            }

            .card-center-divider {
                margin: 8px 0 6px;
            }

            .score-metrics {
                gap: 5px;
            }

            .metric-row {
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 4px 6px;
                font-size: 0.62rem;
                line-height: 1.3;
            }

            .metric-row-label {
                flex: 1 1 100%;
                min-width: 0;
                align-items: flex-start;
            }

            .metric-v {
                white-space: normal;
                overflow: visible;
                text-overflow: unset;
                word-break: break-word;
            }

            .metric-score-side {
                flex: 1 1 100%;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 1px;
            }

            .metric-fraction {
                font-size: 0.6rem;
            }

            .metric-bar {
                width: 56px;
                height: 3px;
            }

            .score-gauge-stack {
                gap: 5px;
            }

            .score-gauge-wrap {
                width: 58px;
                height: 58px;
            }

            .score-gauge-wrap svg {
                width: 58px;
                height: 58px;
            }

            .gauge-score-num {
                font-size: 1.12rem;
            }

            .gauge-score-unit {
                font-size: 0.55rem;
                margin-top: 2px;
            }

            .card-aside-cluster .grade-badge,
            .card-gauge-col .grade-badge {
                font-size: 0.54rem;
                padding: 2px 5px;
            }

            .empty-state {
                padding: 32px 14px;
                font-size: 0.88rem;
            }

            .footer-note {
                margin-top: 22px;
                padding-top: 14px;
                font-size: 0.72rem;
            }

            .sort-row {
                gap: 4px;
                margin-bottom: 12px;
            }

            .sort-btn {
                padding: 4px 8px;
                font-size: 0.65rem;
            }

            .additive-tag { font-size: 0.54rem; }
        }
    </style>
</head>
<body>
    <nav class="site-nav" aria-label="주요 메뉴">
        <div class="nav-inner">
            <span class="brand">PurePick</span>
        </div>
    </nav>

    <div class="container">
        <p class="partner-disclosure">쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
        <div class="intro">
            <p class="subtitle">건강 식품 랭킹 · 점수가 높을수록 건강에 좋습니다</p>
        </div>

        <div class="search-box">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="text" id="searchInput" placeholder="제품명으로 검색..." autocomplete="off">
        </div>

        <div class="category-tabs" role="tablist" id="categoryTabs">
            <button type="button" class="category-btn active" data-category="전체" role="tab" aria-selected="true">전체</button>
        </div>

        <div class="sort-row" id="sortRow">
            <span class="sort-label">정렬:</span>
            <button class="sort-btn active" data-sort="score">점수순</button>
            <button class="sort-btn" data-sort="price_asc">가격 낮은순</button>
            <button class="sort-btn" data-sort="price_desc">가격 높은순</button>
        </div>

        <div id="loadingState" class="loading-state">
            <div class="loading-spinner"></div>
            <p>데이터 로딩 중...</p>
        </div>

        <div class="product-list" id="productList"></div>

        <div class="empty-state hidden" id="emptyState">검색 결과가 없습니다.</div>

        <div id="paginationBar" class="pagination-bar hidden"></div>

        <p class="footer-note">* 건강 점수는 주원료 함량(30점) + 첨가물 안전성(35점) + 인증(20점) + 위생(15점) = 100점 만점입니다</p>
    </div>

    <script>
    // ─────────────────────────────────────────────────────────
    // PurePick 프론트엔드
    // products.json (runner.py 출력물)을 fetch하여 렌더링
    // JSON 없을 때는 내장 샘플 데이터로 동작
    // ─────────────────────────────────────────────────────────

    const CATEGORY_EMOJI = {
        가공육:'🥓', 음료:'🧃', 유제품:'🥛', 과자:'🍪',
        면류:'🍜', 통조림:'🥫', 냉동식품:'🧊', '소스·조미료':'🫙',
        '빵·베이커리':'🍞', '두부·콩나물':'🥬', '김치·반찬':'🥢', 기타:'📦'
    };

    /* ── 고위험 첨가물 목록 (프론트 뱃지용) ── */
    const HIGH_RISK = ['아질산나트륨','아질산칼륨','황색4호','황색5호','적색2호','적색40호',
                       '이산화티타늄','BHA','BHT','아스파탐','카라기난','폴리소르베이트80'];
    const MED_RISK  = ['MSG','글루탐산나트륨','안식향산나트륨','안식향산','사카린','사카린나트륨',
                       '인산','인산나트륨','액상과당','카라멜색소','수크랄로스'];

    const PAGE_SIZE = 20;
    let allProducts = [];
    let filtered    = [];
    let currentPage = 1;
    let currentSort = 'score';

    /* ────────── 데이터 로딩 ────────── */
    async function loadData() {
        // 1) products.json 시도
        try {
            const res = await fetch('data/products.json');
            if (res.ok) {
                const json = await res.json();
                allProducts = (json.products || json || []).map(normalizeProduct);
                if (allProducts.length > 0) return;
            }
        } catch (_) {}

        // 2) 폴백: 내장 샘플 (runner.py 실행 전 미리보기)
        allProducts = SAMPLE_PRODUCTS.map(normalizeProduct);
    }

    /* products.json의 실제 구조 → 렌더링용 공통 포맷 변환 */
    function normalizeProduct(p) {
        const sc = p.score || {};
        const bd = sc.breakdown || {};

        // runner.py 결과물 형식
        if (sc.total !== undefined) {
            return {
                id:            p.id || '',
                name:          p.name || '',
                brand:         p.brand || '',
                category:      p.category || '기타',
                weight:        p.weight || '',
                price:         p.price,
                image:         p.image_url || '',
                coupangUrl:    p.coupang_url || '',
                emartUrl:      p.emart_url || '',
                source:        p.source || 'unknown',
                manufacturer:  p.manufacturer || '',
                certifications: p.certifications || [],
                haccp:         p.haccp || false,
                adminActions:  p.admin_actions || 0,
                recallCount:   p.recall_count || 0,
                score:         sc.total,
                grade:         sc.grade,
                gradeClass:    sc.grade_color,
                bd: {
                    main:  { score: (bd.ingredient||{}).score||0, max:30, text: fmtIngr(p) },
                    add:   { score: (bd.additive||{}).score||0,   max:35, text: fmtAdditives(p), items: (bd.additive||{}).items||[] },
                    cert:  { score: (bd.certification||{}).score||0, max:20, text: (bd.certification||{}).detail||'없음' },
                    hyg:   { score: (bd.hygiene||{}).score||0,    max:15, text: (bd.hygiene||{}).detail||'기본' }
                },
                rank:         p.rank || 0,
                categoryRank: p.category_rank || 0,
            };
        }

        // 기존 샘플 데이터 형식 (하위 호환)
        const mi = p.mainIngredient || {};
        const certs = p.certifications || [];
        const addText = (p.additives||'').trim();
        const score = p.score || 0;

        const qMain = mi.percent != null ? Math.min(1, mi.percent/100) : 0.4;
        const pieces = addText ? addText.split(/[·,]/).filter(Boolean).length : 0;
        const qAdd = addText ? Math.max(0.15, 1 - 0.1*pieces) : 1;
        const certOnly = certs.filter(c=>c!=='HACCP');
        let qCert = 0.1;
        if (certOnly.includes('유기농')) qCert += 0.52;
        else if (certOnly.includes('무항생제')) qCert += 0.4;
        qCert = Math.min(1, qCert);
        const qHyg = certs.includes('HACCP') ? 0.93 : 0.4;
        const ideals = [qMain*30, qAdd*35, qCert*20, qHyg*15];
        const sumI = ideals.reduce((a,b)=>a+b,0)||1;
        const sc2 = ideals.map((x,i)=>Math.min([30,35,20,15][i], Math.max(0, Math.round(x/sumI*score))));
        let diff = score - sc2.reduce((a,b)=>a+b,0);
        for (let g=0; diff!==0&&g<200; g++) {
            const caps=[30,35,20,15];
            if (diff>0) { const i=caps.findIndex((c,j)=>sc2[j]<c); if(i<0)break; sc2[i]++;diff--; }
            else { const i=sc2.findIndex(s=>s>0); if(i<0)break; sc2[i]--;diff++; }
        }

        const grade = score>=85?{label:'우수',cls:'grade-excellent'}
                    : score>=70?{label:'양호',cls:'grade-good'}
                    : score>=50?{label:'보통',cls:'grade-average'}
                    : {label:'주의',cls:'grade-caution'};

        return {
            id:p.id||'', name:p.name||'', brand:p.brand||'',
            category:p.category||'기타', weight:p.packSize||p.weight||'',
            price:p.price||null, image:p.image||'',
            coupangUrl:p.coupangUrl||'', emartUrl:'',
            source: p.coupangUrl?'coupang':'sample',
            manufacturer:'', certifications:certs,
            haccp:certs.includes('HACCP'), adminActions:0, recallCount:0,
            score, grade:grade.label, gradeClass:grade.cls,
            bd:{
                main:{ score:sc2[0], max:30, text: mi.percent!=null?`${mi.name} ${mi.percent}%`:mi.name||'정보없음' },
                add: { score:sc2[1], max:35, text:addText||'첨가물 없음', items:[] },
                cert:{ score:sc2[2], max:20, text:certOnly.length?certOnly.join('·'):'없음' },
                hyg: { score:sc2[3], max:15, text:certs.includes('HACCP')?'HACCP':'기본' }
            },
            rank:0, categoryRank:0
        };
    }

    function fmtIngr(p) {
        if (p.main_ingredient && p.main_ingredient_pct)
            return `${p.main_ingredient} ${p.main_ingredient_pct}%`;
        if (p.main_ingredient) return p.main_ingredient;
        return '정보없음';
    }

    function fmtAdditives(p) {
        const items = ((p.score||{}).breakdown||{}).additive?.items || [];
        if (items.length === 0) return (p.additives_raw||'').trim() || '첨가물 없음';
        return items.map(i=>i.name).join('·') || '첨가물 없음';
    }

    /* ────────── 렌더링 ────────── */
    function getAdditiveTagsHtml(bd) {
        const items = bd.add.items || [];
        if (items.length === 0) {
            const text = bd.add.text || '';
            // 텍스트 기반 위험 감지
            const tokens = text.split(/[·,]/).map(t=>t.trim()).filter(Boolean);
            const dangerTokens = tokens.filter(t => HIGH_RISK.some(r => t.includes(r)));
            const warnTokens   = tokens.filter(t => !HIGH_RISK.some(r=>t.includes(r)) && MED_RISK.some(r=>t.includes(r)));
            if (!dangerTokens.length && !warnTokens.length) return '';
            return `<div class="additive-tags">`
                + dangerTokens.slice(0,3).map(t=>`<span class="additive-tag tag-danger">⚠ ${t}</span>`).join('')
                + warnTokens.slice(0,3).map(t=>`<span class="additive-tag tag-warning">△ ${t}</span>`).join('')
                + `</div>`;
        }
        const danger = items.filter(i=>i.penalty>=7).slice(0,3);
        const warn   = items.filter(i=>i.penalty>=4&&i.penalty<7).slice(0,3);
        if (!danger.length && !warn.length) return '';
        return `<div class="additive-tags">`
            + danger.map(i=>`<span class="additive-tag tag-danger">⚠ ${i.name}</span>`).join('')
            + warn.map(i=>`<span class="additive-tag tag-warning">△ ${i.name}</span>`).join('')
            + `</div>`;
    }

    function getSourceBadges(p) {
        const badges = [];
        if (p.coupangUrl) badges.push(`<span class="source-badge badge-coupang">쿠팡</span>`);
        if (p.emartUrl)   badges.push(`<span class="source-badge badge-emart">이마트</span>`);
        return badges.length ? `<div class="source-badges">${badges.join('')}</div>` : '';
    }

    function getBuyButton(p) {
        if (p.coupangUrl) {
            return `<a href="${esc(p.coupangUrl)}" target="_blank" rel="noopener noreferrer sponsored" class="coupang-btn">쿠팡 구매</a>`;
        }
        if (p.emartUrl) {
            return `<a href="${esc(p.emartUrl)}" target="_blank" rel="noopener noreferrer" class="coupang-btn" style="background:#1b5ea8">이마트 구매</a>`;
        }
        const q = encodeURIComponent(p.name);
        return `<a href="https://www.coupang.com/np/search?q=${q}" target="_blank" rel="noopener noreferrer" class="coupang-btn">검색 구매</a>`;
    }

    function metricRowHtml(key, val, score, max) {
        const pct = max > 0 ? Math.min(100, (score/max)*100) : 0;
        return `<div class="metric-row">
            <div class="metric-row-label">
                <span class="metric-k">${key}</span>
                <span class="metric-v">${esc(val)}</span>
            </div>
            <div class="metric-score-side">
                <span class="metric-fraction">${score}점 <span class="metric-max">/ ${max}점</span></span>
                <div class="metric-bar"><span class="metric-bar-fill" style="width:${pct}%"></span></div>
            </div>
        </div>`;
    }

    function thumbHtml(p) {
        if (p.image) return `<img src="${esc(p.image)}" alt="" loading="lazy" onerror="this.style.display='none'">`;
        return `<span class="product-thumb-emoji">${CATEGORY_EMOJI[p.category]||'📦'}</span>`;
    }

    function priceHtml(p) {
        if (!p.price) return '';
        return `<span class="meta-sep">·</span><span class="product-pack">${p.price.toLocaleString()}원</span>`;
    }

    function gaugeStrokeCls(gradeClass) {
        if (gradeClass==='grade-good'||gradeClass==='grade-average') return 'gauge-fill gauge-good';
        if (gradeClass==='grade-caution') return 'gauge-fill gauge-caution';
        return 'gauge-fill';
    }

    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderPage() {
        const list = document.getElementById('productList');
        const emptyState = document.getElementById('emptyState');
        const pagBar = document.getElementById('paginationBar');

        list.innerHTML = '';
        pagBar.innerHTML = '';
        pagBar.classList.add('hidden');

        if (filtered.length === 0) {
            emptyState.classList.remove('hidden');
            return;
        }
        emptyState.classList.add('hidden');

        const start = (currentPage - 1) * PAGE_SIZE;
        const end   = start + PAGE_SIZE;
        const page  = filtered.slice(start, end);

        const R = 26, len = 2 * Math.PI * R;

        page.forEach((p, idx) => {
            const globalIdx = start + idx;
            const rankNum   = globalIdx + 1;
            const rankCls   = `rank-${Math.min(rankNum, 6)}`;
            const gOff      = len * (1 - p.score / 100);
            const sCls      = gaugeStrokeCls(p.gradeClass);
            const addTags   = getAdditiveTagsHtml(p.bd);
            const srcBadges = getSourceBadges(p);
            const buyBtn    = getBuyButton(p);

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="card-row-image">
                    <span class="rank-badge ${rankCls}">${rankNum}</span>
                    <div class="product-thumb">${thumbHtml(p)}</div>
                </div>
                <div class="card-center-cluster">
                    <div class="card-row-title-block">
                        <div class="product-info">
                            <h3>${esc(p.name)}</h3>
                            <p class="product-subline">
                                <span class="product-brand">${esc(p.brand)}</span>
                                ${p.weight?`<span class="meta-sep">·</span><span class="product-pack">${esc(p.weight)}</span>`:''}
                                ${priceHtml(p)}
                            </p>
                            ${srcBadges}
                        </div>
                    </div>
                    <div class="card-row-metrics-block">
                        <div class="card-center-divider"></div>
                        <div class="score-metrics">
                            ${metricRowHtml('주원료:', p.bd.main.text, p.bd.main.score, p.bd.main.max)}
                            ${metricRowHtml('첨가물:', p.bd.add.text, p.bd.add.score, p.bd.add.max)}
                            ${addTags}
                            ${metricRowHtml('인증:', p.bd.cert.text, p.bd.cert.score, p.bd.cert.max)}
                            ${metricRowHtml('위생:', p.bd.hyg.text, p.bd.hyg.score, p.bd.hyg.max)}
                        </div>
                    </div>
                </div>
                <div class="card-aside-cluster">
                    <div class="card-gauge-col">
                        <div class="score-gauge-stack">
                            <div class="score-gauge-wrap">
                                <svg viewBox="0 0 64 64" aria-hidden="true">
                                    <circle class="gauge-bg" cx="32" cy="32" r="${R}"/>
                                    <circle class="${sCls}" cx="32" cy="32" r="${R}"
                                        stroke-dasharray="${len}" stroke-dashoffset="${gOff}"/>
                                </svg>
                                <div class="gauge-center">
                                    <span class="gauge-score-num">${p.score}</span>
                                    <span class="gauge-score-unit">점</span>
                                </div>
                            </div>
                            <span class="grade-badge ${p.gradeClass}">${p.grade}</span>
                        </div>
                    </div>
                    ${buyBtn}
                </div>`;
            list.appendChild(card);
        });

        // 페이지네이션
        const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
        if (totalPages > 1) {
            pagBar.classList.remove('hidden');
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '‹';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; renderPage(); scrollTo({top:0,behavior:'smooth'}); };
            pagBar.appendChild(prevBtn);

            const maxShow = 5;
            let pStart = Math.max(1, currentPage - 2);
            let pEnd   = Math.min(totalPages, pStart + maxShow - 1);
            if (pEnd - pStart < maxShow - 1) pStart = Math.max(1, pEnd - maxShow + 1);

            for (let pg = pStart; pg <= pEnd; pg++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (pg === currentPage ? ' active' : '');
                btn.textContent = pg;
                const _pg = pg;
                btn.onclick = () => { currentPage = _pg; renderPage(); scrollTo({top:0,behavior:'smooth'}); };
                pagBar.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = '›';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { currentPage++; renderPage(); scrollTo({top:0,behavior:'smooth'}); };
            pagBar.appendChild(nextBtn);

            const info = document.createElement('span');
            info.style.cssText = 'font-size:.72rem;color:var(--text-muted);margin-left:4px;';
            info.textContent = `${filtered.length}개`;
            pagBar.appendChild(info);
        }
    }

    /* ────────── 필터·정렬 ────────── */
    function applyFilters() {
        const q    = document.getElementById('searchInput').value.trim().toLowerCase();
        const cat  = document.querySelector('.category-btn.active')?.dataset.category || '전체';

        filtered = allProducts.filter(p => {
            const hay = [p.name, p.brand, p.weight, p.category, p.manufacturer].join(' ').toLowerCase();
            const matchQ   = !q || hay.includes(q);
            const matchCat = cat === '전체' || p.category === cat;
            return matchQ && matchCat;
        });

        // 정렬
        if (currentSort === 'score') {
            filtered.sort((a, b) => b.score - a.score);
        } else if (currentSort === 'price_asc') {
            filtered.sort((a, b) => (a.price||999999) - (b.price||999999));
        } else {
            filtered.sort((a, b) => (b.price||0) - (a.price||0));
        }

        currentPage = 1;
        renderPage();
    }

    /* ────────── 카테고리 탭 동적 생성 ────────── */
    function buildCategoryTabs() {
        const cats = ['전체', ...new Set(allProducts.map(p => p.category))];
        const tabBar = document.getElementById('categoryTabs');
        tabBar.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'category-btn' + (cat === '전체' ? ' active' : '');
            btn.dataset.category = cat;
            btn.setAttribute('role', 'tab');
            btn.setAttribute('aria-selected', cat === '전체' ? 'true' : 'false');
            btn.textContent = (CATEGORY_EMOJI[cat] ? CATEGORY_EMOJI[cat] + ' ' : '') + cat;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('active'); b.setAttribute('aria-selected','false');
                });
                btn.classList.add('active'); btn.setAttribute('aria-selected','true');
                applyFilters();
            });
            tabBar.appendChild(btn);
        });
    }

    /* ────────── 초기화 ────────── */
    async function init() {
        document.getElementById('loadingState').classList.remove('hidden');
        await loadData();
        document.getElementById('loadingState').classList.add('hidden');

        buildCategoryTabs();
        applyFilters();

        document.getElementById('searchInput').addEventListener('input', () => applyFilters());

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                applyFilters();
            });
        });
    }

    /* ────────── 내장 샘플 데이터 ────────── */
    const SAMPLE_PRODUCTS = [
        { name:'목우촌 주부9단 그릴후랑크', packSize:'200g', score:88, category:'가공육', brand:'목우촌',
          coupangUrl:'https://link.coupang.com/a/d9na8N', image:'',
          mainIngredient:{name:'돼지고기',percent:82}, additives:'아질산나트륨·인산염', certifications:['무항생제','HACCP'] },
        { name:'하림 닭가슴살 소시지', packSize:'150g', score:86, category:'가공육', brand:'하림',
          coupangUrl:'', image:'',
          mainIngredient:{name:'닭고기',percent:85}, additives:'인산염', certifications:['무항생제'] },
        { name:'롯데 의성마늘햄', packSize:'200g', score:82, category:'가공육', brand:'롯데',
          coupangUrl:'', image:'',
          mainIngredient:{name:'돼지고기',percent:70}, additives:'아질산나트륨·인산염', certifications:[] },
        { name:'동원 리얼 치킨 비엔나', packSize:'150g', score:72, category:'가공육', brand:'동원',
          coupangUrl:'', image:'',
          mainIngredient:{name:'닭고기',percent:62}, additives:'MSG·아질산나트륨·착색료', certifications:[] },
        { name:'CJ 스팸 클래식', packSize:'340g', score:58, category:'가공육', brand:'CJ',
          coupangUrl:'', image:'',
          mainIngredient:{name:'돼지고기',percent:52}, additives:'아질산나트륨·인산염·MSG·착색료·보존료', certifications:[] },
        { name:'제주 100% 감귤착즙주스', packSize:'1000ml', score:94, category:'음료', brand:'제주',
          coupangUrl:'', image:'',
          mainIngredient:{name:'감귤과즙',percent:100}, additives:'', certifications:['유기농'] },
        { name:'서울우유 흰우유', packSize:'1000ml', score:90, category:'음료', brand:'서울우유협동조합',
          coupangUrl:'', image:'',
          mainIngredient:{name:'원유',percent:100}, additives:'', certifications:['HACCP'] },
        { name:'매일유업 바이오거트 플레인', packSize:'450g', score:87, category:'음료', brand:'매일유업',
          coupangUrl:'', image:'',
          mainIngredient:{name:'원유',percent:85}, additives:'', certifications:['무항생제'] },
        { name:'웅진 자연은 사과', packSize:'1000ml', score:85, category:'음료', brand:'웅진식품',
          coupangUrl:'', image:'',
          mainIngredient:{name:'사과과즙',percent:100}, additives:'', certifications:[] },
        { name:'롯데칠성 칠성사이다', packSize:'500ml', score:52, category:'음료', brand:'롯데칠성',
          coupangUrl:'', image:'',
          mainIngredient:{name:'탄산수',percent:null}, additives:'액상과당·구연산·향료', certifications:[] },
        { name:'코카콜라', packSize:'500ml', score:44, category:'음료', brand:'코카콜라음료',
          coupangUrl:'', image:'',
          mainIngredient:{name:'탄산수',percent:null}, additives:'액상과당·카라멜색소·인산·향료', certifications:[] },
    ];

    init();
    </script>
</body>
</html>
