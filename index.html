<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanPick - 건강 식품 랭킹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f7f7f5;
            --bg-nav: #ffffff;
            --text: #1c1c1a;
            --text-muted: #6b6b66;
            --border: #e4e4df;
            --green-excellent: #1a6b3a;
            --orange-good: #c47a15;
            --red-caution: #c0392b;
            --btn-coupang: #1a6b3a;
            --btn-coupang-hover: #14532d;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text);
            padding-top: 56px;
        }

        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
        }

        .nav-inner {
            max-width: 540px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 24px 40px;
        }

        .intro {
            margin-bottom: 22px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.5;
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #b8c4b8;
            box-shadow: 0 0 0 3px rgba(26, 107, 58, 0.08);
        }

        .search-box input::placeholder {
            color: #9c9c96;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9c9c96;
            font-size: 1rem;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
        }

        .category-btn {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .category-btn:hover {
            border-color: #c8c8c2;
            color: var(--text);
        }

        .category-btn.active {
            background: var(--green-excellent);
            border-color: var(--green-excellent);
            color: #fff;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .product-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            border-color: #d0d0ca;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .product-card.hidden {
            display: none;
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .product-main {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 0;
        }

        .rank-badge {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
            background: #5c5c58;
        }

        .rank-1 { background: #3d3d3a; }
        .rank-2 { background: #52524e; }
        .rank-3 { background: #6b6b66; }
        .rank-4,
        .rank-5,
        .rank-6 { background: #8a8a84; }

        .product-info {
            min-width: 0;
        }

        .product-info h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.35;
        }

        .product-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .score-section {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .score-gauge svg {
            display: block;
        }

        .gauge-score-num {
            font-size: 17px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .gauge-unit {
            font-size: 10px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .grade-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .card-details {
            margin-top: 10px;
            padding-top: 12px;
            border-top: 1px solid #efefec;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.8rem;
            color: #4a4a45;
            line-height: 1.45;
        }

        .detail-row strong {
            color: #33332f;
            font-weight: 600;
            margin-right: 6px;
        }

        .detail-row.cert-line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .detail-row.cert-line strong {
            flex-shrink: 0;
        }

        .cert-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }

        .cert-badge {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .cert-organic {
            background: rgba(26, 107, 58, 0.1);
            color: var(--green-excellent);
        }

        .cert-antibiotic-free {
            background: rgba(196, 122, 21, 0.12);
            color: var(--orange-good);
        }

        .cert-haccp {
            background: rgba(28, 28, 26, 0.06);
            color: #4a4a45;
        }

        .cert-none {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .grade-excellent {
            background: rgba(26, 107, 58, 0.12);
            color: var(--green-excellent);
        }

        .grade-good {
            background: rgba(196, 122, 21, 0.14);
            color: var(--orange-good);
        }

        .grade-caution {
            background: rgba(192, 57, 43, 0.12);
            color: var(--red-caution);
        }

        .coupang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 16px;
            background: var(--btn-coupang);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
            margin-top: 14px;
        }

        .coupang-btn:hover {
            background: var(--btn-coupang-hover);
            box-shadow: 0 4px 14px rgba(26, 107, 58, 0.25);
        }

        .coupang-btn:active {
            transform: translateY(1px);
        }

        .empty-state {
            text-align: center;
            padding: 44px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-state.hidden {
            display: none;
        }

        .footer-note {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="site-nav" aria-label="주요 메뉴">
        <div class="nav-inner">
            <span class="brand">CleanPick</span>
        </div>
    </nav>

    <div class="container">
        <div class="intro">
            <p class="subtitle">건강 식품 랭킹 · 점수가 높을수록 건강에 좋습니다</p>
        </div>

        <div class="search-box">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="text" id="searchInput" placeholder="제품명으로 검색..." autocomplete="off">
        </div>

        <div class="category-tabs" role="tablist">
            <button type="button" class="category-btn active" data-category="전체" role="tab" aria-selected="true">전체</button>
            <button type="button" class="category-btn" data-category="가공육" role="tab" aria-selected="false">가공육</button>
            <button type="button" class="category-btn" data-category="음료" role="tab" aria-selected="false">음료</button>
        </div>

        <div class="product-list" id="productList">
            <!-- Products will be rendered by JS -->
        </div>

        <div class="empty-state hidden" id="emptyState">
            검색 결과가 없습니다.
        </div>

        <p class="footer-note">* 건강 점수는 100점 만점 기준입니다</p>
    </div>

    <script>
        const products = [
            {
                name: '목우촌 주부9단 프랑크',
                score: 88,
                category: '가공육',
                brand: '목우촌',
                mainIngredient: { name: '돼지고기', percent: 82 },
                additives: '아질산나트륨·인산염',
                certifications: ['무항생제']
            },
            {
                name: '삼성 무항생제 한돈 비엔나',
                score: 84,
                category: '가공육',
                brand: '삼성',
                mainIngredient: { name: '돼지고기', percent: 75 },
                additives: '아질산나트륨·인산염',
                certifications: ['무항생제']
            },
            {
                name: '동원 리얼 치킨 소시지',
                score: 79,
                category: '가공육',
                brand: '동원',
                mainIngredient: { name: '닭고기', percent: 68 },
                additives: 'MSG·아질산나트륨·착색료',
                certifications: []
            },
            {
                name: 'CJ 스팸 클래식',
                score: 61,
                category: '가공육',
                brand: 'CJ',
                mainIngredient: { name: '돼지고기', percent: 52 },
                additives: '아질산나트륨·인산염·MSG·착색료·보존료',
                certifications: []
            },
            {
                name: '롯데 의성마늘 햄',
                score: 82,
                category: '가공육',
                brand: '롯데',
                mainIngredient: { name: '돼지고기', percent: 70 },
                additives: '아질산나트륨·인산염',
                certifications: []
            },
            {
                name: '하림 닭가슴살 소시지',
                score: 86,
                category: '가공육',
                brand: '하림',
                mainIngredient: { name: '닭고기', percent: 85 },
                additives: '인산염',
                certifications: ['무항생제']
            },
            {
                name: '제주 감귤 100% 착즙주스',
                score: 93,
                category: '음료',
                brand: '제주',
                mainIngredient: { name: '감귤과즙', percent: 100 },
                additives: '',
                certifications: ['유기농']
            },
            {
                name: '롯데 칠성사이다',
                score: 55,
                category: '음료',
                brand: '롯데',
                mainIngredient: { name: '탄산수', percent: null },
                additives: '액상과당·구연산·향료',
                certifications: []
            },
            {
                name: '서울우유 흰우유',
                score: 90,
                category: '음료',
                brand: '서울우유',
                mainIngredient: { name: '원유', percent: 100 },
                additives: '',
                certifications: ['HACCP']
            },
            {
                name: '매일 바이오 요거트',
                score: 88,
                category: '음료',
                brand: '매일',
                mainIngredient: { name: '원유', percent: 85 },
                additives: '',
                certifications: ['무항생제']
            },
            {
                name: '코카콜라',
                score: 48,
                category: '음료',
                brand: '코카콜라',
                mainIngredient: { name: '탄산수', percent: null },
                additives: '액상과당·카라멜색소·인산·향료',
                certifications: []
            },
            {
                name: '자연은 착즙 사과주스',
                score: 92,
                category: '음료',
                brand: '자연은',
                mainIngredient: { name: '사과과즙', percent: 100 },
                additives: '',
                certifications: []
            }
        ];

        const CERT_CLASS = {
            유기농: 'cert-organic',
            무항생제: 'cert-antibiotic-free',
            HACCP: 'cert-haccp'
        };

        function getGrade(score) {
            if (score >= 85) return { label: '우수', class: 'grade-excellent' };
            if (score >= 65) return { label: '양호', class: 'grade-good' };
            return { label: '주의', class: 'grade-caution' };
        }

        function gaugeStrokeColor(score) {
            if (score >= 85) return '#1a6b3a';
            if (score >= 65) return '#c47a15';
            return '#c0392b';
        }

        function scoreGaugeHTML(score) {
            const cx = 44;
            const cy = 44;
            const r = 34;
            const circumference = 2 * Math.PI * r;
            const pct = Math.min(100, Math.max(0, Number(score))) / 100;
            const offset = circumference * (1 - pct);
            const stroke = gaugeStrokeColor(score);
            return `
                <div class="score-gauge" role="img" aria-label="건강 점수 ${score}점">
                    <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ebeae6" stroke-width="5"/>
                        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${stroke}" stroke-width="5"
                            stroke-linecap="round"
                            stroke-dasharray="${circumference}"
                            stroke-dashoffset="${offset}"
                            transform="rotate(-90 ${cx} ${cy})"/>
                        <text x="${cx}" y="${cy + 1}" text-anchor="middle" class="gauge-score-num" fill="#1c1c1a">${score}</text>
                        <text x="${cx}" y="${cy + 14}" text-anchor="middle" class="gauge-unit" fill="#6b6b66">점</text>
                    </svg>
                </div>
            `;
        }

        function formatMainIngredient(mi) {
            if (mi.percent != null && mi.percent !== '') {
                return `${mi.name} ${mi.percent}%`;
            }
            return mi.name;
        }

        function formatAdditives(text) {
            return text && String(text).trim() ? text.trim() : '첨가물 없음';
        }

        function renderCertBadges(certs) {
            if (!certs || certs.length === 0) {
                return '<span class="cert-none">해당 없음</span>';
            }
            return `<div class="cert-badges">${certs.map(c => {
                const cls = CERT_CLASS[c] || 'cert-haccp';
                return `<span class="cert-badge ${cls}">${c}</span>`;
            }).join('')}</div>`;
        }

        function getCoupangUrl(productName) {
            return 'https://www.coupang.com/np/search?q=' + encodeURIComponent(productName);
        }

        function renderProducts(filteredProducts) {
            const list = document.getElementById('productList');
            const emptyState = document.getElementById('emptyState');

            list.innerHTML = '';

            if (filteredProducts.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            filteredProducts.forEach((product, index) => {
                const grade = getGrade(product.score);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.dataset.name = product.name;
                card.dataset.category = product.category;

                const rankClass = `rank-${Math.min(index + 1, 6)}`;

                const additivesLine = formatAdditives(product.additives);
                const certHtml = renderCertBadges(product.certifications);
                const gaugeHtml = scoreGaugeHTML(product.score);

                card.innerHTML = `
                    <div class="card-top">
                        <div class="product-main">
                            <span class="rank-badge ${rankClass}" aria-label="순위 ${index + 1}">${index + 1}</span>
                            <div class="product-info">
                                <h3>${product.name}</h3>
                                <span class="product-meta">${product.brand} · ${product.category}</span>
                            </div>
                        </div>
                        <div class="score-section">
                            ${gaugeHtml}
                            <span class="grade-badge ${grade.class}">${grade.label}</span>
                        </div>
                    </div>
                    <div class="card-details">
                        <div class="detail-row"><strong>주원료</strong>${formatMainIngredient(product.mainIngredient)}</div>
                        <div class="detail-row"><strong>첨가물</strong>${additivesLine}</div>
                        <div class="detail-row cert-line"><strong>인증</strong>${certHtml}</div>
                    </div>
                    <a href="${getCoupangUrl(product.name)}" target="_blank" rel="noopener noreferrer" class="coupang-btn">
                        🛒 쿠팡에서 구매하기
                    </a>
                `;

                list.appendChild(card);
            });
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;

            let filtered = products.filter(p => {
                const matchSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
                const matchCategory = activeCategory === '전체' || p.category === activeCategory;
                return matchSearch && matchCategory;
            });

            filtered.sort((a, b) => b.score - a.score);
            renderProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterProducts);

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
                filterProducts();
            });
        });

        renderProducts(products);
    </script>
</body>
</html>
